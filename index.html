<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <title>Course Advisor</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
       <h1>Course Advisor</h1>
       <h4>Unsure of which courses to take?</h4>
       <h4>Don't worry! Take a quiz below to help you decide!</h4>
   </header>
   <main>
    <section class="options">
       <p>Which courses are you deciding between? </p>
       <div class="dropdown">
            <select>
                <option value="CS 312 vs. CS 314">CS 312 vs. CS 314</option>
                <option value="AP CSA vs. CS3">AP CSA vs. CS3</option>
                <option value="Biology vs. AP Biology">Biology vs. AP Biology</option>
            </select>
       </div>
    </section>
    <section class="questions">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar">
                <span id="progress-text">0%</span>
            </div>
        </div>
        <div>
            <p id="question">1. Have you taken CS 312?</p>
            <img src="images/cs312.webp" class="image">
            <div class="button-container">
                <button id="Yes">Yes</button>
                <button id="No">No</button>
            </div>
        </div>
    </section>
   </main>
   <footer>
       <p>© 2026 Nishant Tripathi. All Rights Reserved</p>
   </footer>
   <script src="script.js"></script>
</body>
</html>
