<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <title>Course Advisor</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
       <h1>Course Advisor</h1>
       <h4>Unsure of which courses to take?</h4>
       <h4>Don't worry! Take a quiz below to help you decide!</h4>
   </header>
   <main>
    <section>
        <div class="options">
        <p>Which courses are you deciding between? </p>
        <div class="dropdown">
                <select id="selectedCourse">
                    <option value="CS 312 vs. CS 314">CS 312 vs. CS 314</option>
                    <option value="AP CSA vs. CS3">AP CSA vs. CS3</option>
                    <option value="Biology vs. AP Biology">Biology vs. AP Biology</option>
                </select>
        </div>
        </div>
        <div class="questions">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div>
                <div class="questionHeader">
                    <p id="questionNumber">1.</p>
                    <p id="question">How comfortable are you with Java?</p>
                </div>
                <img id="image" class="image">
                <div class="button-container">
                    <button id="buttonOne">Wrote multi-class OOP programs</button>
                    <button id="buttonTwo">Know another language, not Java</button>
                    <button id="buttonThree">Mostly simple single-file programs</button>
                    <button id="buttonFour">Brand new to programming</button>
                </div>
            </div>
        </div>
    </section>
   </main>
   <footer>
       <p>© 2026 Nishant Tripathi. All Rights Reserved</p>
   </footer>
   <script src="script.js"></script>
</body>
</html>
